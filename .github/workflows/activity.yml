name: Github Activity
on:
  schedule:
    - cron: "*/60 * * * *"
  workflow_dispatch:
jobs:
  build:
    name: Update this repo's README with recent activity
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # REVIEW: actions/checkout@v3 is outdated. Consider updating to v4.
      - uses: actions/checkout@v3
      - uses: jamesgeorge007/github-activity-readme@master
        env:
          # NOTE: Uses SECRET when present, otherwise falls back to the
          # repository-scoped GitHub token so forks can run this workflow.
          GITHUB_TOKEN: ${{ secrets.SECRET || github.token }}
        with:
          MAX_LINES: 15
          COMMIT_NAME: GitHub Activity Readme
