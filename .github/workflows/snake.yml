name: Generate snake animation

on:
  schedule:
    - cron: "*/60 * * * *"

  workflow_dispatch:

  push:
    branches:
    - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: generate snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: dist/snake.svg?palette=github-dark


      # REVIEW: crazy-max/ghaction-github-pages@v3.1.0 may be outdated.
      - name: push snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          # NOTE: Uses SECRET when present, otherwise falls back to the
          # repository-scoped GitHub token so forks can run this workflow.
          GITHUB_TOKEN: ${{ secrets.SECRET || github.token }}
